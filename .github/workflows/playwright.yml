name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check
      - name: Type check
        run: npm run typecheck
      - name: Security audit
        run: npm audit --audit-level=moderate

  test:
    needs: quality
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'playwright.config.ts') }}
      - name: Install Playwright browsers and deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium firefox webkit --with-deps
      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit
      - name: Restore Allure history
        uses: actions/cache/restore@v4
        with:
          path: allure-results/history
          key: allure-history-${{ github.run_number }}
          restore-keys: |
            allure-history-
      - name: Run Playwright tests
        run: npx playwright test
      - name: Verify minimum test count
        if: ${{ !cancelled() }}
        run: |
          EXPECTED=$(jq '.stats.expected' test-results/results.json)
          echo "Tests passed: $EXPECTED"
          if [ "$EXPECTED" -lt 200 ]; then
            echo "Test count too low: $EXPECTED (minimum: 200). A spec file may have been removed."
            exit 1
          fi
      - name: Generate Allure report
        if: ${{ !cancelled() }}
        run: npx allure generate allure-results --clean -o allure-report
      - name: Save Allure history
        uses: actions/cache/save@v4
        if: ${{ !cancelled() }}
        with:
          path: allure-report/history
          key: allure-history-${{ github.run_number }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 5
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-report
          path: allure-report/
          retention-days: 5
